services:
  web:
    build: ./web
    container_name: lucos_contacts_web
    ports:
      - $PORT:80
    image: lucas42/lucos_contacts_web:${VERSION:-latest}
    volumes:
      - "staticfiles:/usr/share/nginx/html/resources"
    restart: always
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  app:
    build: ./app
    container_name: lucos_contacts_app
    image: lucas42/lucos_contacts_app:${VERSION:-latest}
    environment:
      - SECRET_KEY
      - PRODUCTION
      - CLIENT_KEYS
      - LOGANNE_ENDPOINT
      - APP_ORIGIN
    volumes:
      - "staticfiles:/usr/src/app/static"
    restart: always
    depends_on:
      db:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
  db:
    container_name: lucos_contacts_db
    image: postgres:16-alpine
    volumes:
      - db_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
  test:
    build: ./app
    container_name: lucos_contacts_test
    image: lucas42/lucos_contacts_app:${VERSION:-latest}
    environment:
      - SECRET_KEY=test
      - CLIENT_KEYS=external_calendar:test=1234
      - APP_ORIGIN=http://localhost:8013
    depends_on:
      - db
    command: ./manage.py test agents.tests comms.tests lucosauth.tests
    profiles:
      - test
volumes:
  staticfiles:
  db_data: