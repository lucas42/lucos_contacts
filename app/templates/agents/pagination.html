{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="pagination" aria-label="Page navigation">
	{% if page_obj.has_previous %}
		<a href="?page={{ page_obj.previous_page_number }}" class="pagination-link pagination-prev">&#8592; Previous</a>
	{% else %}
		<span class="pagination-link pagination-prev pagination-disabled">&#8592; Previous</span>
	{% endif %}
	<span class="pagination-info">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
	{% if page_obj.has_next %}
		<a href="?page={{ page_obj.next_page_number }}" class="pagination-link pagination-next">Next &#8594;</a>
	{% else %}
		<span class="pagination-link pagination-next pagination-disabled">Next &#8594;</span>
	{% endif %}
</nav>
{% endif %}
